# nginx/stack-in-a-box.conf — canonical site config for the portal.
#
# Source of truth for /etc/nginx/sites-available/stack-in-a-box on EC2.
# scripts/setup/07_nginx_site.sh copies this file VERBATIM (no token
# substitution) and symlinks it into sites-enabled. Because it is copied
# verbatim, every path here is fixed — the docroot is hardcoded and /docs is
# served from a subdirectory of the docroot (run.sh deploys dbt docs there),
# so this config is independent of the repo's install directory.
#
# Docroot is /var/www/stack-in-a-box (www-data owned). The default site is
# disabled by 07 so its /var/www/html docroot doesn't shadow ours.

server {
    listen 80;
    server_name _;

    root /var/www/stack-in-a-box;
    index index.html;

    # No heuristic caching: browsers revalidate before serving a cached copy,
    # so a fresh portal deploy is never masked by a stale cached page. nginx
    # returns 304 when unchanged — cheap.
    add_header Cache-Control "no-cache, must-revalidate" always;

    location / {
        try_files $uri $uri/ =404;
    }

    # dbt docs — run.sh copies dbt/target into $DOCROOT/docs/ after
    # `dbt docs generate`. Served straight from the docroot subdir (no alias),
    # so this stays install-dir-independent. 404s cleanly before the first run.
    location /docs/ {
        try_files $uri $uri/ =404;
    }

    # Auto-generated portal pages (run.sh stages 7, 8, 9d, 9e).
    location = /metrics {
        try_files /metrics.html =404;
    }
    location = /trust {
        try_files /trust.html =404;
    }
    location = /profile {
        try_files /profile.html =404;
    }
    location = /erd {
        try_files /erd.html =404;
    }
}
